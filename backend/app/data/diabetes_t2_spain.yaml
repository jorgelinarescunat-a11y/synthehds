  nuevos_casos_anuales_estimados: 386000

prevalencia_por_edad_sexo:
  "18_40":    { hombre: 2.0,  mujer: 1.5 }
  "41_60":    { hombre: 12.0, mujer: 8.0 }
  "61_75":    { hombre: 42.4, mujer: 29.8 }
  mayor_75:   { hombre: 37.4, mujer: 41.3 }

variacion_regional:
