# ============================================================
# PREVALENCIAS Y DISTRIBUCIONES CLINICAS - DIABETES TIPO 2 ESPANA
# ============================================================
# Fuentes oficiales (CITAR SIEMPRE en el data sheet):
#
# [1] Soriguer F, Goday A, Bosch-Comas A, et al.
#     Prevalence of diabetes mellitus and impaired glucose regulation
#     in Spain: the Di@bet.es Study.
#     Diabetologia. 2012;55:88-93.
#
# [2] Ministerio de Sanidad. Prevalencia de diabetes mellitus en 2016
#     en Espana segun la Base de Datos Clinicos de Atencion Primaria (BDCAP).
#     Endocrinologia, Diabetes y Nutricion. 2021.
#     DOI: 10.1016/j.endinu.2020.03.019
#
# [3] Ruiz-Garcia A, et al. Prevalencia de diabetes mellitus en el ambito
#     de la atencion primaria espanola y su asociacion con factores
#     de riesgo cardiovascular. Estudio SIMETAP-DM.
#     Clinica e Investigacion en Arteriosclerosis. 2020.
#
# [4] Estudio Cantabria sobre retinopatia diabetica.
#     Atencion Primaria. 2020. DOI: 10.1016/j.aprim.2018.09.004
#
# [5] Mata-Cases M et al. RedgedapS. Caracteristicas clinicas y
#     tratamiento antidiabetico en DM2 en atencion primaria espanola.
#     Medicina de Familia SEMERGEN. 2021.

prevalencia_global:
